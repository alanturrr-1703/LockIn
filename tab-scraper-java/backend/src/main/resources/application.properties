# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Application ───────────────────────────────────────────────────────────────
spring.application.name=tab-scraper-java

# ── H2 File-based Datasource ──────────────────────────────────────────────────
# Data is written to  backend/data/scraper.mv.db
# AUTO_SERVER=TRUE lets multiple processes share the same file safely
spring.datasource.url=jdbc:h2:file:./data/scraper;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# "update" creates the table on first run, then leaves existing data alone
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
# Tell Hibernate to use H2 dialect explicitly
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── H2 Web Console ────────────────────────────────────────────────────────────
# Browse your data at http://localhost:8080/h2-console
# JDBC URL to enter there: jdbc:h2:file:./data/scraper
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
spring.h2.console.settings.trace=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.lockin.scraper=DEBUG
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ── Jackson (JSON serialization) ──────────────────────────────────────────────
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ── Multipart (increase limit in case full HTML is posted) ────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── JSONL streaming output ────────────────────────────────────────────────────
# Path where the queue consumer writes one JSON object per line.
# Relative to the working directory (backend/) when running ./gradlew bootRun.
# Change to an absolute path (e.g. /tmp/scrapes.jsonl) if needed.
scraper.jsonl.path=./data/scrapes.jsonl

# ── Tile NDJSON streaming output ──────────────────────────────────────────────
# One JSON object per line, field order matches yt_scraper.py exactly:
# video_id, title, channel, description, thumbnail_url, url, tile_type,
# scraped_at, page_url, received_at
scraper.tiles.jsonl.path=./data/tiles.jsonl
