<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>YT Tile Scraper → Java</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                font-size: 13px;
                width: 320px;
                background: #0f0f0f;
                color: #e8e8e8;
                padding: 14px;
            }

            /* ── Header ── */
            h1 {
                font-size: 14px;
                font-weight: 700;
                color: #fff;
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 12px;
            }

            .dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #22c55e;
                flex-shrink: 0;
            }
            .dot.offline {
                background: #ef4444;
            }
            .dot.checking {
                background: #f59e0b;
                animation: pulse 1s infinite;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }

            /* ── Fields ── */
            .field {
                margin-bottom: 10px;
            }

            label {
                display: block;
                font-size: 10px;
                color: #666;
                margin-bottom: 3px;
                text-transform: uppercase;
                letter-spacing: 0.6px;
            }

            input[type="text"],
            select {
                width: 100%;
                padding: 5px 8px;
                background: #1a1a1a;
                border: 1px solid #2e2e2e;
                border-radius: 5px;
                color: #e8e8e8;
                font-size: 12px;
                outline: none;
                transition: border-color 0.15s;
            }

            input[type="text"]:focus,
            select:focus {
                border-color: #555;
            }

            select option {
                background: #1a1a1a;
            }

            /* ── Buttons ── */
            .btn-row {
                display: flex;
                gap: 7px;
                margin-bottom: 10px;
            }

            button {
                flex: 1;
                padding: 7px 8px;
                border: none;
                border-radius: 6px;
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                transition:
                    opacity 0.15s,
                    transform 0.1s;
            }

            button:active {
                transform: scale(0.97);
            }
            button:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            #btn-scrape {
                background: #ff0000;
                color: #fff;
            }
            #btn-scrape:hover:not(:disabled) {
                background: #cc0000;
            }

            #btn-watch {
                background: #1e1e1e;
                color: #aaa;
                border: 1px solid #333;
            }
            #btn-watch.active {
                background: #1a2e1a;
                border-color: #22c55e55;
                color: #22c55e;
            }
            #btn-watch:hover:not(:disabled) {
                background: #2a2a2a;
            }

            #btn-view {
                background: #1e1e1e;
                color: #aaa;
                border: 1px solid #2a2a2a;
            }
            #btn-view:hover:not(:disabled) {
                background: #2a2a2a;
            }

            /* ── Status ── */
            #status {
                min-height: 20px;
                padding: 6px 9px;
                border-radius: 5px;
                background: #1a1a1a;
                border: 1px solid #2a2a2a;
                font-size: 11.5px;
                color: #888;
                margin-bottom: 10px;
                white-space: pre-wrap;
                word-break: break-word;
                line-height: 1.55;
            }
            #status.ok {
                color: #22c55e;
                border-color: #22c55e33;
                background: #0b1a0e;
            }
            #status.error {
                color: #f87171;
                border-color: #f8717133;
                background: #1a0b0b;
            }
            #status.busy {
                color: #f59e0b;
                border-color: #f59e0b33;
                background: #1a1500;
            }

            /* ── Stats card ── */
            #stats-card {
                display: none;
                background: #141414;
                border: 1px solid #2a2a2a;
                border-radius: 7px;
                padding: 10px 12px;
                margin-bottom: 10px;
            }
            #stats-card.visible {
                display: block;
            }

            .stats-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 5px 12px;
            }

            .stat-cell {
                font-size: 11px;
                color: #666;
            }
            .stat-cell span {
                color: #d1d5db;
                font-variant-numeric: tabular-nums;
            }

            .stat-cell.wide {
                grid-column: 1 / -1;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* ── Footer ── */
            footer {
                font-size: 10px;
                color: #3a3a3a;
                text-align: center;
            }
            footer code {
                font-family: monospace;
                background: #1a1a1a;
                padding: 1px 4px;
                border-radius: 3px;
            }
        </style>
    </head>
    <body>
        <h1>
            <span class="dot checking" id="health-dot"></span>
            YT Tile Scraper &rarr; Java
        </h1>

        <div class="field">
            <label for="endpoint">Backend endpoint</label>
            <input
                id="endpoint"
                type="text"
                value="http://localhost:8080/tiles"
            />
        </div>

        <div class="field">
            <label for="mode">Scrape mode</label>
            <select id="mode">
                <option value="lookahead" selected>
                    lookahead &mdash; 3000px below fold
                </option>
                <option value="strict">strict &mdash; visible only</option>
                <option value="all">all &mdash; everything in DOM</option>
            </select>
        </div>

        <div class="btn-row">
            <button id="btn-scrape">&#9654; Scrape Now</button>
            <button id="btn-watch">&#128337; Watch Off</button>
            <button id="btn-view">&#128203; All Tiles</button>
        </div>

        <div id="status">Ready. Open a YouTube page then click Scrape Now.</div>

        <div id="stats-card">
            <div class="stats-grid">
                <div class="stat-cell">
                    Sent: <span id="stat-sent">&mdash;</span>
                </div>
                <div class="stat-cell">
                    Accepted: <span id="stat-accepted">&mdash;</span>
                </div>
                <div class="stat-cell">
                    Duplicate: <span id="stat-dup">&mdash;</span>
                </div>
                <div class="stat-cell">
                    Stored: <span id="stat-stored">&mdash;</span>
                </div>
                <div class="stat-cell wide" id="stat-page" title=""></div>
            </div>
        </div>

        <footer>
            Backend: <code>./gradlew bootRun</code> &mdash; port 8080
        </footer>

        <script src="popup.js"></script>
    </body>
</html>
