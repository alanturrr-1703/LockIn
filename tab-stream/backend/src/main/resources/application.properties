# Server
server.port=8081
spring.application.name=tab-stream

# H2 File Datasource
spring.datasource.url=jdbc:h2:file:./data/tabstream;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# Logging
logging.level.com.lockin.tabstream=DEBUG
logging.level.org.springframework.web.socket=INFO

# Multipart / Request Size (15 MB)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
spring.web.resources.add-mappings=false

# Custom rate-limit properties
scraper.rate-limit.max-requests=30
scraper.rate-limit.window-seconds=60
